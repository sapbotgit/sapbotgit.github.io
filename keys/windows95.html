<title>Windows 95 Keys</title>
<h1>Real-time made keys. (MAY NOT WORK!)</h1>
<script>
  function generateString() {
  const dayOfYear = Math.floor(Math.random() * 366) + 1;
  const year = Math.floor(Math.random() * 10) + 94;
  const divisibleBy7 = Math.floor(Math.random() * 143) * 7;
  const randomNumbers = Math.floor(Math.random() * 10000);
  
  const formattedDayOfYear = dayOfYear.toString().padStart(3, '0');
  const formattedYear = year.toString().padStart(2, '0');
  const formattedDivisibleBy7 = divisibleBy7.toString().padStart(7, '0');
  const formattedRandomNumbers = randomNumbers.toString();
  
  return `${formattedDayOfYear}${formattedYear}-OEM-${formattedDivisibleBy7}-${formattedRandomNumbers}`;
}

const generatedString = generateString();
var p = document.createElement("p");
p.textContent = generatedString;

</script>
